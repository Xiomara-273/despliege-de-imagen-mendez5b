name: tarea3.0

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Login hacia Github Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} 

    - name: Contruir la imagen
      run: docker build -t ghcr.io/xiomara-273/proyecto:3.0.0 .

    - name: Push de la imagen a Github Container Registry
      run: docker push ghcr.io/xiomara-273/proyecto:3.0.0

    - name: Mostrar las variables o secrets
      run: |
        echo "Probando servidor ssh"
        echo "Host: ${{ secrets.VPS_HOST }}"
        echo "User: ${{ secrets.VPS_USER }}"
        echo "Port: ${{ secrets.VPS_SSH_PORT }}"

    - name: Probar conexion ssh
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          echo "Conexión SSH exitosa"
          touch ejemplo.txt

    - name: Pasar archivos desde git al servidor
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "stack.yml,Mackefile"
        target: "/home/${{ secrets.VPS_USER }}/quintob"

    - name: Desplegando servicios
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        port: ${{ secrets.VPS_SSH_PORT }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          echo "Desplegando servicios"
          cd ~/quintob
          docker pull ghcr.io/xiomara-273/proyecto:3.0.0
          docker stack deploy -c stack.yml borrar